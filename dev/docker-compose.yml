services:
  # 1. Relational DB (Postgres)
  postgres:
    image: postgres:16-alpine
    container_name: dev_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: vision_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Document DB (Mongo)
  mongodb:
    image: mongo:latest
    container_name: dev_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. Message Broker (Redis)
  redis:
    image: redis:alpine
    container_name: dev_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 4. API Instances (Scaling to 2)
  # Using 'deploy/replicas' is the modern way, or we can just scale via CLI.
  # We'll name the service 'api' so Nginx can load balance via Docker DNS.
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    deploy:
      replicas: 2
    depends_on:
      postgres: { condition: service_healthy }
      mongodb: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      DATABASE_URL: postgresql+asyncpg://admin:password123@postgres:5432/vision_db
      MONGO_URL: mongodb://mongodb:27017
      REDIS_URL: redis://redis:6379/0

  # 5. Load Balancer (Nginx)
  nginx:
    image: nginx:stable-alpine
    container_name: dev_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80" # The external entry point for the API
    depends_on:
      - api

  # 6. Background Worker
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dev_worker
    command: python -m backend.worker
    depends_on:
      mongodb: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      MONGO_URL: mongodb://mongodb:27017
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app

  # 7. React Frontend
  frontend:
    build: ./frontend
    container_name: dev_frontend
    ports:
      - "3000:80"
    depends_on:
      - nginx

volumes:
  postgres_data:
  mongo_data:
